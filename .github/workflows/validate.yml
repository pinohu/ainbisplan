name: Validate design-system and authority platform

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate planning and repository structure
        run: pnpm validate

      - name: Validate per-business plan generation and inventory parity
        run: pnpm plan:sample

      - name: Build packages
        run: pnpm build

      - name: Execute portfolio authority triage
        run: node scripts/execute-authority-portfolio.mjs

      - name: Validate all portfolio execution outputs
        run: pnpm validate:execution

      - name: Type-check packages
        run: pnpm typecheck
