name: Autonomous Portfolio Controller

on:
  pull_request:
    paths:
      - controller/**
      - scripts/controller/**
      - fixtures/controller.config.sample.json
      - package.json
      - .github/workflows/autonomous-portfolio-controller.yml
  push:
    branches: [main]
    paths:
      - controller/config.json
      - scripts/controller/**
      - scripts/generate-business-authority-plans.mjs
      - scripts/execute-authority-portfolio.mjs
      - packages/authority-platform/**
      - .github/workflows/autonomous-portfolio-controller.yml
  repository_dispatch:
    types: [ainbis-source-changed, ainbis-runtime-changed, launchpad-catalog-changed]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: autonomous-portfolio-controller
  cancel-in-progress: false

jobs:
  validate-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - name: Validate controller fixture and packages
        run: pnpm check:controller

  reconcile-portfolio:
    if: github.event_name != 'pull_request'
    needs: validate-controller
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Create organization GitHub App token
        id: app-token
        if: vars.AINBIS_CONTROLLER_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.AINBIS_CONTROLLER_APP_ID }}
          private-key: ${{ secrets.AINBIS_CONTROLLER_PRIVATE_KEY }}
          owner: pinohu
          repositories: ainbis,ainbisplan,ainbis-launchpad

      - name: Require a cross-repository controller credential
        env:
          CONTROLLER_TOKEN: ${{ steps.app-token.outputs.token || secrets.AINBIS_CONTROLLER_TOKEN }}
        run: |
          if [ -z "${CONTROLLER_TOKEN:-}" ]; then
            echo "::error::Configure AINBIS_CONTROLLER_APP_ID and AINBIS_CONTROLLER_PRIVATE_KEY, or the fallback AINBIS_CONTROLLER_TOKEN secret."
            exit 1
          fi

      - name: Check out planning repository
        uses: actions/checkout@v4
        with:
          repository: pinohu/ainbisplan
          ref: main
          path: planning
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.AINBIS_CONTROLLER_TOKEN }}

      - name: Check out authoritative source repository
        uses: actions/checkout@v4
        with:
          repository: pinohu/ainbis
          ref: main
          path: source
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token || secrets.AINBIS_CONTROLLER_TOKEN }}

      - name: Check out launchpad repository
        uses: actions/checkout@v4
        with:
          repository: pinohu/ainbis-launchpad
          ref: main
          path: launchpad
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token || secrets.AINBIS_CONTROLLER_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install planning dependencies
        working-directory: planning
        run: pnpm install --no-frozen-lockfile

      - name: Refresh every source-backed authority plan
        working-directory: planning
        run: |
          node scripts/generate-business-authority-plans.mjs \
            --inventory ../source/docs/INVENTORY.json \
            --blueprints-root ../source \
            --output plans/businesses \
            --mode refresh \
            --source-repository pinohu/ainbis

      - name: Execute authority platform across the full portfolio
        working-directory: planning
        run: pnpm execute:portfolio

      - name: Reconcile source, plans, launchpad, builds, operators and gates
        working-directory: planning
        run: |
          node scripts/controller/reconcile.mjs \
            --inventory ../source/docs/INVENTORY.json \
            --source-root ../source \
            --launchpad-root ../launchpad \
            --build-manifest ../source/builds/manifest.json \
            --mode apply

      - name: Validate generated plans and controller state
        working-directory: planning
        run: |
          node scripts/generate-business-authority-plans.mjs \
            --inventory ../source/docs/INVENTORY.json \
            --output plans/businesses \
            --mode validate
          pnpm validate:execution
          pnpm controller:validate
          pnpm typecheck

      - name: Synchronize exception issue
        working-directory: planning
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.AINBIS_CONTROLLER_TOKEN }}
        run: |
          set -euo pipefail
          title="Autonomous portfolio exceptions"
          body_file="controller/exceptions/owner-exceptions.md"
          issue_number="$(gh issue list --repo pinohu/ainbisplan --state open --search \"${title} in:title\" --json number --jq '.[0].number // empty')"
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" --repo pinohu/ainbisplan --title "$title" --body-file "$body_file"
          else
            gh issue create --repo pinohu/ainbisplan --title "$title" --body-file "$body_file"
          fi

      - name: Commit generated controller and plan state
        id: commit
        working-directory: planning
        env:
          CONTROLLER_TOKEN: ${{ steps.app-token.outputs.token || secrets.AINBIS_CONTROLLER_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "ainbis-controller[bot]"
          git config user.email "ainbis-controller[bot]@users.noreply.github.com"
          git add \
            plans/businesses \
            plans/authority-plan-corpus-summary.json \
            reports/portfolio \
            apps/portfolio-console/data.json \
            controller/state \
            controller/reports \
            controller/exceptions
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count="$(jq -r '.reconciliation.source_count' controller/state/controller-state.json)"
          git commit -m "Synchronize autonomous portfolio controller (${count} businesses) [controller-sync]"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Dispatch controller state to launchpad
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.AINBIS_CONTROLLER_TOKEN }}
          PLANNING_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          source_count="$(jq -r '.reconciliation.source_count' planning/controller/state/controller-state.json)"
          exception_count="$(jq -r '.exceptions | length' planning/controller/state/controller-state.json)"
          gh api --method POST repos/pinohu/ainbis-launchpad/dispatches \
            -f event_type=ainbis-controller-state-changed \
            -f client_payload[planning_sha]="$PLANNING_SHA" \
            -f client_payload[source_count]="$source_count" \
            -f client_payload[exception_count]="$exception_count"

      - name: Upload controller evidence
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-portfolio-controller-state
          path: |
            planning/controller/state/
            planning/controller/reports/
            planning/controller/exceptions/
          if-no-files-found: error
          retention-days: 30
