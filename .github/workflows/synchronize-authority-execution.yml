name: Synchronize authority execution

on:
  pull_request:
    paths:
      - packages/authority-platform/**
      - scripts/execute-authority-portfolio.mjs
      - scripts/validate-authority-execution.mjs
      - plans/businesses/**
      - .github/workflows/synchronize-authority-execution.yml
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  synchronize:
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Check out writable branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Execute every portfolio plan
        run: pnpm execute:portfolio

      - name: Validate execution outputs
        run: pnpm validate:execution

      - name: Commit synchronized execution state
        run: |
          if git diff --quiet; then
            echo "Execution state is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plans/businesses reports/portfolio apps/portfolio-console/data.json
          git commit -m "Synchronize all authority portfolio execution plans"
          git push origin HEAD
